<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Dataset</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07030f;
      --panel: rgba(15, 10, 27, 0.84);
      --panel-strong: rgba(18, 11, 32, 0.94);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f6f2ff;
      --muted: #b9b0cc;
      --accent: #cf4dff;
      --accent-2: #7d5cff;
      --accent-3: #59d0ff;
      --shadow: 0 24px 80px rgba(118, 44, 255, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Outfit", sans-serif;
      color: var(--text);
      overflow-x: hidden;
      overflow-y: hidden;
      background:
        radial-gradient(circle at top left, rgba(185, 58, 255, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(85, 158, 255, 0.14), transparent 25%),
        linear-gradient(180deg, #14081d 0%, #09040f 45%, #06020a 100%);
      scrollbar-width: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.75), transparent 82%);
      pointer-events: none;
      z-index: -2;
    }

    .page-glow {
      position: fixed;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: -1;
    }

    .page-glow-left {
      top: -70px;
      left: -100px;
      background: rgba(207, 77, 255, 0.26);
    }

    .page-glow-right {
      top: 140px;
      right: -120px;
      background: rgba(89, 208, 255, 0.16);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      width: 100%;
      height: 92px;
    }

    .nav-shell {
      width: 100%;
      min-height: 92px;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 7, 20, 0.82);
      backdrop-filter: blur(20px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    .brand {
      color: inherit;
      text-decoration: none;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .brand span {
      color: var(--accent);
    }

    .nav-cta,
    .upload-btn {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      color: var(--text);
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      box-shadow: 0 14px 36px rgba(184, 74, 255, 0.35);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      font-family: inherit;
      font-weight: 700;
    }

    .nav-cta {
      padding: 10px 16px;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .nav-cta:hover,
    .upload-btn:hover,
    .browse-btn:hover,
    .back-link:hover {
      transform: translateY(-2px);
    }

    .upload-page {
      min-height: calc(100vh - 92px);
      max-width: 1260px;
      margin: 0 auto;
      padding: 12px 24px 16px;
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
      gap: 28px;
      align-items: center;
    }

    .upload-panel,
    .floating-image {
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .upload-panel {
      padding: 22px 22px;
      border-radius: 30px;
      background:
        radial-gradient(circle at top left, rgba(207, 77, 255, 0.12), transparent 35%),
        var(--panel);
      align-self: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: #e38cff;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .upload-panel h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 3.2vw, 2.65rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .panel-copy {
      margin: 0 0 14px;
      max-width: 560px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.48;
    }

    .upload-card {
      padding: 16px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--panel-strong);
    }

    .upload-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .upload-card-top h2 {
      margin: 0;
      font-size: 1.18rem;
    }

    .upload-status {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .file-area {
      display: block;
      border: 1.5px dashed rgba(207, 77, 255, 0.55);
      border-radius: 24px;
      padding: 18px 16px;
      background:
        radial-gradient(circle at 20% 20%, rgba(89, 208, 255, 0.1), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.015));
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
      text-align: center;
    }

    .file-area:hover {
      transform: translateY(-2px);
      border-color: rgba(207, 77, 255, 0.78);
    }

    input[type="file"] {
      display: none;
    }

    .file-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 10px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.55rem;
      background: linear-gradient(135deg, rgba(125, 92, 255, 0.28), rgba(89, 208, 255, 0.22));
      box-shadow: 0 10px 26px rgba(207, 77, 255, 0.18);
    }

    .file-area strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .file-area small {
      color: var(--muted);
      line-height: 1.5;
    }

    .upload-actions {
      display: flex;
      gap: 14px;
      margin-top: 12px;
    }

    .upload-btn,
    .back-link {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 0.98rem;
    }

    .upload-btn {
      flex: 1;
      padding: 0 20px;
    }

    .back-link {
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .visual-wrap {
      position: relative;
      height: 560px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      overflow: visible;
    }

    .visual-stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: visible;
    }

    .floating-image {
      position: absolute;
      overflow: hidden;
      border-radius: 16px;
      background: var(--panel-strong);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .floating-image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .image-back {
      top: 24px;
      right: 8%;
      width: 48%;
      height: 80%;
      transform: rotate(0deg);
      opacity: 0.94;
      z-index: 1;
    }

    .image-front {
      top: 128px;
      right: 31%;
      width: 48%;
      height: 80%;
      transform: rotate(0deg);
      z-index: 2;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
    }

    #statusMessage {
      margin-top: 14px;
      min-height: 22px;
      font-size: 0.94rem;
      font-weight: 600;
    }

    @media (max-width: 1100px) {
      .upload-page {
        min-height: auto;
        grid-template-columns: 1fr;
        padding-bottom: 24px;
      }

      .visual-wrap {
        height: 420px;
      }
    }

    @media (max-width: 820px) {
      .site-header {
        height: auto;
      }

      .nav-shell {
        min-height: auto;
        padding: 16px;
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }

      .upload-page {
        padding: 14px 16px 26px;
        gap: 24px;
      }

      .upload-panel {
        padding: 24px 20px;
      }

      .upload-actions {
        flex-direction: column;
      }

      .visual-wrap {
        height: 360px;
        justify-content: center;
      }

      .image-back {
        top: 14px;
        right: 10%;
        width: 54%;
        height: 74%;
      }

      .image-front {
        top: 84px;
        right: 32%;
        width: 54%;
        height: 74%;
      }
    }
  </style>
</head>
<body>
  <div class="page-glow page-glow-left"></div>
  <div class="page-glow page-glow-right"></div>

  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="/">ChartBot<span>.AI</span></a>
      <a class="nav-cta" href="/">Home</a>
    </div>
  </header>

  <main class="upload-page">
    <section class="upload-panel">
      <p class="eyebrow">Dataset Upload</p>
      <h1>Upload your file and let ChartBot.AI start the workflow</h1>
      <p class="panel-copy">
        Add a CSV or Excel file to begin dataset inspection, AI review, KPI discovery,
        and dashboard generation from one guided flow.
      </p>

      <div class="upload-card">
        <div class="upload-card-top">
          <h2>Select Your Dataset</h2>
          <span class="upload-status">CSV or XLSX</span>
        </div>

        <label class="file-area" for="fileInput">
          <div class="file-icon">+</div>
          <strong>Click to upload your dataset</strong>
          <small>Drag and drop style upload area for `.csv`, `.xlsx`, and `.xls` files</small>
          <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" />
        </label>

        <div class="upload-actions">
          <button class="upload-btn" id="uploadBtn" type="button">Upload & Analyze</button>
          <a class="back-link" href="/">Back</a>
        </div>

        <div id="statusMessage"></div>
      </div>

    </section>

    <section class="visual-wrap" aria-hidden="true">
      <div class="visual-stage">

        <div class="floating-image image-back">
          <img src="/static/Photos/BI5.png" alt="Dashboard layout preview">
        </div>

        <div class="floating-image image-front">
          <img src="/static/Photos/BI4.png" alt="Dashboard upload preview">
        </div>
      </div>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusMessage = document.getElementById("statusMessage");

    uploadBtn.addEventListener("click", () => {
      if (!fileInput.files.length) {
        fileInput.click();
        return;
      }
      fileInput.dispatchEvent(new Event("change"));
    });

    async function uploadFileToBackend(file) {
      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch("/cleaning/upload-dataset", {
        method: "POST",
        body: formData
      });

      if (!res.ok) {
        throw new Error("Dataset upload failed");
      }

      const data = await res.json();

      if (!data.dataset_id) {
        throw new Error("No dataset_id returned from backend");
      }

      localStorage.setItem("dataset_id", data.dataset_id);
      localStorage.setItem("dataset_uploaded", "true");
    }

    fileInput.addEventListener("change", async function (e) {
      const file = e.target.files[0];
      if (!file) return;

      statusMessage.innerText = "Uploading dataset and preparing analysis...";
      statusMessage.style.color = "#bfe7ff";

      await uploadFileToBackend(file);

      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: function (results) {
          const data = results.data;
          const columns = results.meta.fields;
          const analysis = analyzeDataset(data, columns);

          localStorage.setItem("datasetSampleRows", JSON.stringify(data.slice(0, 30)));
          localStorage.setItem("datasetAnalysis", JSON.stringify(analysis));
          window.location.href = "/metadata";
        }
      });
    });

    function analyzeDataset(data, columns) {
      const rowCount = data.length;
      const columnStats = {};
      let duplicateRows = 0;
      const seen = new Set();

      data.forEach(row => {
        const rowStr = JSON.stringify(row);
        if (seen.has(rowStr)) duplicateRows++;
        else seen.add(rowStr);
      });

      columns.forEach(col => {
        let missing = 0;
        let numericValues = [];
        let isDate = true;

        data.forEach(row => {
          const val = row[col];
          if (val === null || val === "" || val === undefined) {
            missing++;
          } else {
            const num = Number(val);
            if (!isNaN(num)) numericValues.push(num);
            if (isNaN(Date.parse(val))) isDate = false;
          }
        });

        let mean = null;
        let std = null;

        if (numericValues.length) {
          mean = numericValues.reduce((a, b) => a + b, 0) / numericValues.length;
          std = Math.sqrt(
            numericValues.reduce((a, b) => a + Math.pow(b - mean, 2), 0) /
            numericValues.length
          );
        }

        columnStats[col] = {
          missing_percentage: ((missing / rowCount) * 100).toFixed(2),
          type:
            isDate ? "datetime" :
            numericValues.length > rowCount * 0.6 ? "numerical" : "categorical",
          basic_stats: numericValues.length ? {
            min: Math.min(...numericValues),
            max: Math.max(...numericValues),
            mean: mean.toFixed(2),
            std: std.toFixed(2)
          } : null
        };
      });

      return {
        rows: rowCount,
        columns: columns.length,
        column_names: columns,
        duplicate_rows: duplicateRows,
        inferred_columns: columnStats
      };
    }
  </script>
</body>
</html>
