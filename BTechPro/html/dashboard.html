<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auto KPI Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --panel: rgba(15, 10, 27, 0.84);
  --panel-strong: rgba(18, 11, 32, 0.94);
  --border: rgba(255, 255, 255, 0.08);
  --text: #f6f2ff;
  --muted: #b9b0cc;
  --accent: #cf4dff;
  --accent-2: #7d5cff;
  --shadow: 0 24px 80px rgba(118, 44, 255, 0.22);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Outfit", sans-serif;
  color: var(--text);
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(185, 58, 255, 0.18), transparent 30%),
    radial-gradient(circle at top right, rgba(85, 158, 255, 0.14), transparent 25%),
    linear-gradient(180deg, #14081d 0%, #09040f 45%, #06020a 100%);
  overflow-x: hidden;
  scrollbar-width: none;
}

body::-webkit-scrollbar {
  display: none;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.75), transparent 82%);
  pointer-events: none;
  z-index: -2;
}

.page-glow {
  position: fixed;
  width: 360px;
  height: 360px;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  z-index: -1;
}

.page-glow-left {
  top: -70px;
  left: -100px;
  background: rgba(207, 77, 255, 0.26);
}

.page-glow-right {
  top: 140px;
  right: -120px;
  background: rgba(89, 208, 255, 0.16);
}

.site-header {
  position: sticky;
  top: 0;
  z-index: 10;
  width: 100%;
  height: 92px;
}

.nav-shell {
  width: 100%;
  min-height: 92px;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(10, 7, 20, 0.82);
  backdrop-filter: blur(20px);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
}

.brand {
  color: inherit;
  text-decoration: none;
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: 0.02em;
}

.brand span {
  color: var(--accent);
}

.nav-cta,
button {
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 999px;
  color: var(--text);
  background: linear-gradient(90deg, var(--accent-2), var(--accent));
  box-shadow: 0 14px 36px rgba(184, 74, 255, 0.35);
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  font-family: inherit;
  font-weight: 700;
}

.nav-cta {
  padding: 10px 16px;
  font-size: 0.9rem;
  text-decoration: none;
}

.nav-cta:hover,
button:hover {
  transform: translateY(-2px);
}

.dashboard-page {
  max-width: 1320px;
  margin: 0 auto;
  padding: 16px 24px 24px;
}

.panel {
  border: 1px solid var(--border);
  background: var(--panel);
  backdrop-filter: blur(16px);
  box-shadow: var(--shadow);
  border-radius: 30px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.eyebrow {
  margin: 0;
  color: #e38cff;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  font-size: 0.78rem;
  font-weight: 700;
}

.panel h1 {
  margin: 0;
  font-size: clamp(1.8rem, 3vw, 2.6rem);
  line-height: 1.04;
  letter-spacing: -0.04em;
}

.subtitle {
  font-size: 0.94rem;
  color: var(--muted);
  line-height: 1.55;
  max-width: 760px;
}

.controls {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

button {
  min-height: 48px;
  padding: 0 20px;
  font-size: 0.94rem;
}

#downloadBtn {
  display: none;
}

#loader {
  display: none;
  text-align: center;
  margin: 6px 0 0;
  padding: 22px 18px;
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: var(--panel-strong);
}

.spinner {
  width: 56px;
  height: 56px;
  border: 6px solid rgba(255, 255, 255, 0.12);
  border-top: 6px solid #cf4dff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

#loader p {
  margin: 0;
  color: var(--muted);
  font-size: 0.92rem;
}

#charts {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 4px;
}

#charts img {
  width: 100%;
  border-radius: 18px;
  background: var(--panel-strong);
  padding: 12px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow:
    0 16px 36px rgba(0, 0, 0, 0.22),
    0 0 18px rgba(125, 92, 255, 0.12);
}

#charts:has(img:only-child),
#charts:has(img:nth-child(2):last-child) {
  justify-content: center;
}

@media (max-width: 1100px) {
  #charts {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 820px) {
  .site-header {
    height: auto;
  }

  .nav-shell {
    min-height: auto;
    padding: 16px;
  }

  .dashboard-page {
    padding: 14px 16px 22px;
  }

  .panel {
    padding: 18px;
  }

  .controls {
    flex-direction: column;
  }

  #charts {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
<div class="page-glow page-glow-left"></div>
<div class="page-glow page-glow-right"></div>

<header class="site-header">
  <div class="nav-shell">
    <a class="brand" href="/">ChartBot<span>.AI</span></a>
    <a class="nav-cta" href="/">Home</a>
  </div>
</header>

<main class="dashboard-page">
  <div class="panel">
    <p class="eyebrow">Dashboard Generator</p>
    <h1>Generate your final dashboard from selected KPIs</h1>
    <div class="subtitle">
      Generate a complete dashboard using your selected KPIs and download it as a single PDF.
    </div>

    <div class="controls">
      <button id="generateBtn" onclick="runDashboard()">Generate Dashboard</button>
      <button id="downloadBtn" onclick="downloadPDF()">Download Dashboard as PDF</button>
    </div>

    <div id="loader">
      <div class="spinner"></div>
      <p>Creating your dashboard, please wait...</p>
    </div>

    <div id="charts"></div>
  </div>
</main>

<script>
function runDashboard() {
  const generateBtn = document.getElementById("generateBtn");
  const downloadBtn = document.getElementById("downloadBtn");
  const loader = document.getElementById("loader");
  const chartsDiv = document.getElementById("charts");

  generateBtn.style.display = "none";
  downloadBtn.style.display = "none";
  loader.style.display = "block";
  chartsDiv.innerHTML = "";

  const storedKPIs = localStorage.getItem("structured_kpis");

  if (!storedKPIs) {
    alert("No KPIs found. Please run KPI Identification first.");
    loader.style.display = "none";
    generateBtn.style.display = "inline-block";
    return;
  }

  const structuredKPIs = JSON.parse(storedKPIs);

  fetch("/chart/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ kpis: structuredKPIs })
  })
  .then(res => res.json())
  .then(data => {
    loader.style.display = "none";

    if (!data.images || data.images.length === 0) {
      const errorHtml = Array.isArray(data.errors) && data.errors.length
        ? `<pre style="white-space:pre-wrap;text-align:left;color:#ffbfd0;background:rgba(255,92,122,0.08);padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,0.08);">${data.errors.join("\n")}</pre>`
        : "";
      chartsDiv.innerHTML = `<p style='text-align:center;color:#b9b0cc;'>No charts generated.</p>${errorHtml}`;
      generateBtn.style.display = "inline-block";
      return;
    }

    data.images.forEach(imgUrl => {
      const img = document.createElement("img");
      img.src = imgUrl;
      chartsDiv.appendChild(img);
    });

    downloadBtn.style.display = "inline-block";
  })
  .catch(err => {
    console.error(err);
    alert("Dashboard generation failed.");
    loader.style.display = "none";
    generateBtn.style.display = "inline-block";
  });
}

function downloadPDF() {
  window.open("/chart/download-dashboard", "_blank");
}
</script>

</body>
</html>
