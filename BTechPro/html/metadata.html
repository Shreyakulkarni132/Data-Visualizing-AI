<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dataset Context</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --panel: rgba(15, 10, 27, 0.84);
      --panel-strong: rgba(18, 11, 32, 0.94);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f6f2ff;
      --muted: #b9b0cc;
      --accent: #cf4dff;
      --accent-2: #7d5cff;
      --shadow: 0 24px 80px rgba(118, 44, 255, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Outfit", sans-serif;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(185, 58, 255, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(85, 158, 255, 0.14), transparent 25%),
        linear-gradient(180deg, #14081d 0%, #09040f 45%, #06020a 100%);
      scrollbar-width: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.75), transparent 82%);
      pointer-events: none;
      z-index: -2;
    }

    .page-glow {
      position: fixed;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: -1;
    }

    .page-glow-left {
      top: -70px;
      left: -100px;
      background: rgba(207, 77, 255, 0.26);
    }

    .page-glow-right {
      top: 140px;
      right: -120px;
      background: rgba(89, 208, 255, 0.16);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      width: 100%;
      height: 92px;
    }

    .nav-shell {
      width: 100%;
      min-height: 92px;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 7, 20, 0.82);
      backdrop-filter: blur(20px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    .brand {
      color: inherit;
      text-decoration: none;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .brand span {
      color: var(--accent);
    }

    .nav-cta,
    button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      color: var(--text);
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      box-shadow: 0 14px 36px rgba(184, 74, 255, 0.35);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      font-family: inherit;
      font-weight: 700;
    }

    .nav-cta {
      padding: 10px 16px;
      font-size: 0.9rem;
    }

    .nav-cta:hover,
    button:hover {
      transform: translateY(-2px);
    }

    .metadata-page {
      min-height: calc(100vh - 92px);
      max-width: 1260px;
      margin: 0 auto;
      padding: 12px 24px 16px;
      display: grid;
      grid-template-columns: minmax(0, 0.96fr) minmax(0, 1.04fr);
      gap: 28px;
      align-items: center;
    }

    .metadata-panel,
    .floating-image {
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .metadata-panel {
      padding: 24px 24px;
      border-radius: 30px;
      background:
        radial-gradient(circle at top left, rgba(207, 77, 255, 0.12), transparent 35%),
        var(--panel);
      align-self: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: #e38cff;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .metadata-panel h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 3.2vw, 2.65rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 0 16px;
      max-width: 560px;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.52;
    }

    .card {
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--panel-strong);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card label {
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--text);
    }

    textarea,
    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    textarea::placeholder {
      color: #9f95b6;
    }

    select option {
      color: #111;
    }

    textarea {
      resize: none;
      min-height: 112px;
    }

    button {
      margin-top: 4px;
      min-height: 52px;
      width: 100%;
      font-size: 1rem;
    }

    .visual-wrap {
      position: relative;
      height: 590px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .visual-stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: visible;
    }

    .floating-image {
      position: absolute;
      overflow: hidden;
      border-radius: 16px;
      background: var(--panel-strong);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .floating-image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .floating-image:hover {
      transform: translateY(-6px);
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.35),
        0 0 38px rgba(207, 77, 255, 0.42);
    }

    .image-single {
      top: 34px;
      right: 14%;
      width: 54%;
      height: 86%;
      z-index: 2;
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.35),
        0 0 28px rgba(125, 92, 255, 0.28);
    }

    @media (max-width: 1100px) {
      body {
        overflow-y: auto;
      }

      .metadata-page {
        min-height: auto;
        grid-template-columns: 1fr;
        padding-bottom: 24px;
      }

      .visual-wrap {
        height: 480px;
      }

      .image-single {
        right: 20%;
        width: 60%;
        height: 84%;
      }
    }

    @media (max-width: 820px) {
      .site-header {
        height: auto;
      }

      .nav-shell {
        min-height: auto;
        padding: 16px;
        flex-direction: row;
        align-items: center;
        text-align: left;
      }

      .metadata-page {
        padding: 14px 16px 22px;
        gap: 22px;
      }

      .metadata-panel {
        padding: 22px 18px;
      }

      .visual-wrap {
        height: 360px;
        justify-content: center;
      }

      .image-single {
        top: 8px;
        right: 10%;
        width: 78%;
        height: 84%;
      }
    }
  </style>
</head>
<body>
  <div class="page-glow page-glow-left"></div>
  <div class="page-glow page-glow-right"></div>

  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="/">ChartBot<span>.AI</span></a>

      <a class="nav-cta" href="/">Home</a>
    </div>
  </header>

  <main class="metadata-page">
    <section class="metadata-panel">
      <p class="eyebrow">Dataset Information</p>
      <h1>Dataset Information</h1>
      <div class="subtitle">
        Help us understand your dataset better. This step is optional but improves analysis quality.
      </div>

      <div class="card">
        <label for="datasetDesc">Describe your dataset</label>
        <textarea
          id="datasetDesc"
          rows="3"
          placeholder="Example: Sales data for an e-commerce platform covering 2023-2025..."
        ></textarea>

        <label for="datasetDomain">Select the most relevant domain</label>
        <select id="datasetDomain">
          <option value="">-- Choose a domain (optional) --</option>
          <option>Business / Sales</option>
          <option>Marketing</option>
          <option>Finance</option>
          <option>Healthcare</option>
          <option>Operations</option>
          <option>Education</option>
          <option>Scientific / Research</option>
          <option>Other</option>
        </select>

        <button onclick="submitMetadata()">Continue to Review</button>
      </div>
    </section>

    <section class="visual-wrap" aria-hidden="true">
      <div class="visual-stage">
        <div class="floating-image image-single">
          <img src="/static/Photos/BI7.png" alt="Analytics context preview">
        </div>
      </div>
    </section>
  </main>

  <script>
    function submitMetadata() {
      const description = document.getElementById("datasetDesc").value.trim();
      const domain = document.getElementById("datasetDomain").value;

      const datasetId = localStorage.getItem("dataset_id");

      const userContext = {
        dataset_id: datasetId,
        dataset_description: description || null,
        dataset_domain: domain || null
      };

      localStorage.setItem("userDatasetContext", JSON.stringify(userContext));
      window.location.href = "/review";
    }
  </script>
</body>
</html>
